<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTogether - 채팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .connection-status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            background: #f0f0f0;
        }

        .connection-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .connection-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.system {
            align-items: center;
        }

        .message.system .message-content {
            background: #e0e0e0;
            color: #666;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 13px;
        }

        .message.mine {
            align-items: flex-end;
        }

        .message.other {
            align-items: flex-start;
        }

        .message-sender {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        .message-content {
            background: white;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.mine .message-content {
            background: #667eea;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
            padding: 0 10px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-container input:focus {
            border-color: #667eea;
        }

        .chat-input-container button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .chat-input-container button:hover {
            transform: scale(1.05);
        }

        .chat-input-container button:active {
            transform: scale(0.95);
        }

        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #667eea;
        }

        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<!-- 로그인 화면 -->
<div id="loginContainer" class="login-container">
    <div class="login-box">
        <h2>🎓 StudyTogether 채팅</h2>
        <input type="text" id="usernameInput" placeholder="닉네임을 입력하세요" />
        <input type="text" id="roomIdInput" placeholder="방 번호를 입력하세요" value="1" />
        <button onclick="connect()">입장하기</button>
    </div>
</div>

<!-- 채팅 화면 -->
<div id="chatContainer" class="chat-container hidden">
    <div class="chat-header">
        <div>💬 채팅방 <span id="roomNumber"></span></div>
    </div>
    <div id="connectionStatus" class="connection-status disconnected">
        연결 중...
    </div>
    <div id="messageArea" class="chat-messages">
        <!-- 메시지가 여기에 표시됩니다 -->
    </div>
    <div class="chat-input-container">
        <input type="text" id="messageInput" placeholder="메시지를 입력하세요..."
               onkeypress="if(event.keyCode === 13) sendMessage()" />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<!-- SockJS 및 STOMP 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let username = null;
    let roomId = null;

    function connect() {
        username = document.getElementById('usernameInput').value.trim();
        roomId = document.getElementById('roomIdInput').value.trim();

        if (!username) {
            alert('닉네임을 입력해주세요!');
            return;
        }

        if (!roomId) {
            alert('방 번호를 입력해주세요!');
            return;
        }

        // UI 전환
        document.getElementById('loginContainer').classList.add('hidden');
        document.getElementById('chatContainer').classList.remove('hidden');
        document.getElementById('roomNumber').textContent = roomId;

        // WebSocket 연결
        const socket = new SockJS('/ws-stomp');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log('Connected: ' + frame);
            updateConnectionStatus(true);

            // 채팅방 구독
            stompClient.subscribe('/sub/chat/room/' + roomId, function(message) {
                showMessage(JSON.parse(message.body));
            });

            // 입장 메시지 전송
            sendEnterMessage();
        }, function(error) {
            console.error('Connection error:', error);
            updateConnectionStatus(false);
        });
    }

    function disconnect() {
        if (stompClient !== null) {
            sendLeaveMessage();
            stompClient.disconnect();
        }
        updateConnectionStatus(false);
        console.log("Disconnected");
    }

    function sendEnterMessage() {
        const message = {
            type: 'ENTER',
            roomId: roomId,
            sender: username,
            memberId: 1  // 임시 ID
        };
        stompClient.send("/pub/chat/message", {}, JSON.stringify(message));
    }

    function sendLeaveMessage() {
        const message = {
            type: 'LEAVE',
            roomId: roomId,
            sender: username,
            memberId: 1  // 임시 ID
        };
        stompClient.send("/pub/chat/message", {}, JSON.stringify(message));
    }

    function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const messageContent = messageInput.value.trim();

        if (messageContent && stompClient) {
            const message = {
                type: 'TALK',
                roomId: roomId,
                sender: username,
                message: messageContent,
                memberId: 1  // 임시 ID
            };

            stompClient.send("/pub/chat/message", {}, JSON.stringify(message));
            messageInput.value = '';
        }
    }

    function showMessage(message) {
        const messageArea = document.getElementById('messageArea');
        const messageElement = document.createElement('div');

        const time = new Date().toLocaleTimeString('ko-KR', {
            hour: '2-digit',
            minute: '2-digit'
        });

        if (message.type === 'ENTER' || message.type === 'LEAVE') {
            // 시스템 메시지
            messageElement.className = 'message system';
            messageElement.innerHTML = `
                    <div class="message-content">${message.message}</div>
                `;
        } else {
            // 일반 채팅 메시지
            const isMine = message.sender === username;
            messageElement.className = isMine ? 'message mine' : 'message other';
            messageElement.innerHTML = `
                    ${!isMine ? `<div class="message-sender">${message.sender}</div>` : ''}
                    <div class="message-content">${message.message}</div>
                    <div class="message-time">${time}</div>
                `;
        }

        messageArea.appendChild(messageElement);
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    function updateConnectionStatus(connected) {
        const statusElement = document.getElementById('connectionStatus');
        if (connected) {
            statusElement.textContent = '🟢 연결됨';
            statusElement.className = 'connection-status connected';
        } else {
            statusElement.textContent = '🔴 연결 끊김';
            statusElement.className = 'connection-status disconnected';
        }
    }

    // 페이지 종료 시 연결 해제
    window.addEventListener('beforeunload', function() {
        disconnect();
    });
</script>
</body>
</html>
