spring:
  application:
    name: StudyTogether
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:demo_db}
    username: ${POSTGRES_USER:demo_user}
    password: ${POSTGRES_PASSWORD:demo_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: true

logging:
  level:
    com.yourpackage: DEBUG
    org.springframework.web.socket: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080
